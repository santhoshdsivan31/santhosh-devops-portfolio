# Base values — overridden per environment
replicaCount: 2

image:
  repository: 123456789.dkr.ecr.ap-south-1.amazonaws.com/sample-api
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
  hosts:
    - host: api.yourdomain.com
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10

# KEDA ScaledObject — scale on Kafka consumer lag
keda:
  enabled: false
  kafkaTopic: ""
  kafkaConsumerGroup: ""
  lagThreshold: "50"

externalSecret:
  enabled: true
  secretStoreName: aws-secrets-manager
  secretPath: "prod/sample-api"
