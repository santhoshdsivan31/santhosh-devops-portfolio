# ArgoCD namespace + install
apiVersion: v1
kind: Namespace
metadata:
  name: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
---
# Pin to a specific version for reproducible installs
# Check latest: https://github.com/argoproj/argo-cd/releases
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
  namespace: argocd
data:
  # Disable TLS on the server (terminate at ingress/ALB instead)
  server.insecure: "true"
  # Enable ApplicationSet controller
  applicationsetcontroller.enable.progressive.syncs: "true"
