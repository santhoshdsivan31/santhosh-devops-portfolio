# kube-prometheus-stack Helm values
# Deploys: Prometheus, Grafana, Alertmanager, node-exporter, kube-state-metrics

prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: "40GB"
    replicas: 2
    replicaExternalLabelName: prometheus_replica

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 50Gi

    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi

    # Scrape all ServiceMonitors and PodMonitors across namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    additionalScrapeConfigs:
      - job_name: mongodb-exporter
        static_configs:
          - targets: ['mongodb-exporter.monitoring.svc.cluster.local:9216']
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance

alertmanager:
  alertmanagerSpec:
    replicas: 2
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          resources:
            requests:
              storage: 5Gi
  config:
    global:
      slack_api_url: "https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK"
      resolve_timeout: 5m
    route:
      group_by: [alertname, cluster, namespace]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: slack-warnings
      routes:
        - match:
            severity: critical
          receiver: slack-critical
          continue: true
        - match:
            severity: warning
          receiver: slack-warnings
    receivers:
      - name: slack-critical
        slack_configs:
          - channel: "#alerts-critical"
            send_resolved: true
            title: "[CRITICAL] {{ .GroupLabels.alertname }}"
            text: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}"
            color: "danger"
      - name: slack-warnings
        slack_configs:
          - channel: "#alerts-warnings"
            send_resolved: true
            title: "[WARNING] {{ .GroupLabels.alertname }}"
            text: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}"
            color: "warning"

grafana:
  replicas: 2
  persistence:
    enabled: true
    storageClassName: gp3
    size: 10Gi

  adminPassword: "changeme-use-external-secret"

  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
    datasources:
      enabled: true

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://kube-prometheus-stack-prometheus:9090
          isDefault: true
        - name: Loki
          type: loki
          url: http://loki:3100

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: "Kubernetes"
          type: file
          disableDeletion: false
          options:
            path: /var/lib/grafana/dashboards/default

  # Pre-load community dashboards by ID
  dashboards:
    default:
      kubernetes-cluster:
        gnetId: 15661
        revision: 1
        datasource: Prometheus
      node-exporter:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
      karpenter:
        gnetId: 20398
        revision: 1
        datasource: Prometheus

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true

prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
