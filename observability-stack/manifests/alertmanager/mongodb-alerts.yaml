# PrometheusRule — MongoDB alerts
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: mongodb-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: mongodb
      interval: 30s
      rules:
        - alert: MongoDBDown
          expr: mongodb_up == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "MongoDB instance {{ $labels.instance }} is down"

        - alert: MongoDBHighConnections
          expr: mongodb_connections{state="current"} / mongodb_connections{state="available"} > 0.8
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "MongoDB {{ $labels.instance }} connections at {{ $value | humanizePercentage }}"

        - alert: MongoDBReplicationLag
          expr: mongodb_replset_member_replication_lag > 30
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "MongoDB replication lag on {{ $labels.instance }} is {{ $value }}s"

        - alert: MongoDBSlowQueries
          expr: rate(mongodb_op_counters_total{type="query"}[5m]) > 1000
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "MongoDB {{ $labels.instance }} processing >1000 queries/sec"
